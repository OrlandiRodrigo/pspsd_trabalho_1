syntax = "proto3";

package servicea;

// Serviço A - responsável por uma funcionalidade de backend
service ServiceA {
  rpc ProcessA (RequestA) returns (ResponseA);
}

// Request enviado pelo Gateway P
message RequestA {
  string userId = 1;
  string payload = 2;
}

// Resposta do Service A
message ResponseA {
  int32 status = 1;
  map<string, int32> result = 2;
}
