syntax = "proto3";

package serviceb;

// Serviço B - segunda parte da aplicação distribuída
service ServiceB {
  rpc ProcessB (RequestB) returns (ResponseB);
}

// Request do Gateway P
message RequestB {
  string userId = 1;
  string data = 2;
}

// Resposta do Service B
message ResponseB {
  string status = 1;
  string output = 2;
}