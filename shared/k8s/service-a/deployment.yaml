apiVersion: apps/v1
kind: Deployment
metadata:
 name: service-a
spec:
 replicas: 1
 selector:
  matchLabels:
   app: service-a
 template:
  metadata:
   labels:
    app: service-a
  spec:
   containers:
    - name: service-a
      image: service-a:v1
      imagePullPolicy: Never
      ports:
       - containerPort: 50051

