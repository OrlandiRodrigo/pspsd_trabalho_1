apiVersion: apps/v1
kind: Deployment
metadata:
 name: gateway-p
spec:
 replicas: 1
 selector:
  matchLabels:
   app: gateway-p
 template:
  metadata:
   labels:
    app: gateway-p
  spec:
   containers:
    - name: gateway-p
      image: gateway-p:v1
      imagePullPolicy: Never
      ports:
      - containerPort: 3000