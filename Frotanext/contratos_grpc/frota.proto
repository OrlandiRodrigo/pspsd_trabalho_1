syntax = "proto3";

package frota;


// ENUMERAÇÕES 

enum TipoVeiculo {
  TIPO_VEICULO_NAO_ESPECIFICADO = 0;
  TIPO_VEICULO_PASSEIO = 1;
  TIPO_VEICULO_UTILITARIO = 2;
  TIPO_VEICULO_MOTOCICLETA = 3;
}

enum StatusVeiculo {
  STATUS_VEICULO_NAO_ESPECIFICADO = 0;
  STATUS_VEICULO_DISPONIVEL = 1;
  STATUS_VEICULO_RESERVADO = 2;
  STATUS_VEICULO_ALUGADO = 3;
  STATUS_VEICULO_EM_MANUTENCAO = 4;
  STATUS_VEICULO_INDISPONIVEL = 5;
}

enum CorVeiculo {
  COR_VEICULO_NAO_ESPECIFICADA = 0;
  COR_VEICULO_PRETO = 1;
  COR_VEICULO_BRANCO = 2;
  COR_VEICULO_PRATA = 3;
  COR_VEICULO_CINZA = 4;
  COR_VEICULO_VERMELHO = 5;
  COR_VEICULO_AZUL = 6;
  COR_VEICULO_VERDE = 7;
  COR_VEICULO_AMARELO = 8;
  COR_VEICULO_OUTRO = 9;
}

enum StatusReserva {
  STATUS_RESERVA_NAO_ESPECIFICADO = 0;
  STATUS_RESERVA_PENDENTE = 1;
  STATUS_RESERVA_CONFIRMADA = 2;
  STATUS_RESERVA_EM_ANDAMENTO = 3;
  STATUS_RESERVA_FINALIZADA = 4;
  STATUS_RESERVA_CANCELADA = 5;
}

// ESTRUTURAS DE VEÍCULOS (Uso de 'oneof' para representar o Polimorfismo)

message DetalhesPasseio {
  string tipo_carroceria = 1;
  int32 qtde_portas = 2;
  int32 qtde_passageiros = 3;
}

message DetalhesUtilitario {
  string tipo_utilitario = 1;
  float capacidade_carga_kg = 2;
  float capacidade_carga_m3 = 3;
  string tipo_carga = 4;
  int32 qtde_eixos = 5;
  int32 max_passageiros = 6;
}

message DetalhesMotocicleta {
  int32 cilindrada = 1;
  string tipo_tracao = 2;
  bool abs = 3;
  bool partida_eletrica = 4;
  string modos_pilotagem = 5;
}

message Veiculo {
  int32 id_veiculo = 1;
  string placa = 2;
  string marca = 3;
  string modelo = 4;
  CorVeiculo cor = 5;
  float valor_diaria = 6;
  int32 ano_fabricacao = 7;
  int32 ano_modelo = 8;
  string chassi = 9;
  string renavam = 10;
  float capacidade_tanque = 11;
  bool cambio_automatico = 12;
  bool ar_condicionado = 13;
  string imagem_url = 14;
  StatusVeiculo status = 15;
  TipoVeiculo tipo_veiculo = 16;

  // Polimorfismo: O veículo terá APENAS UM destes blocos preenchidos
  oneof detalhes_especificos {
    DetalhesPasseio passeio = 17;
    DetalhesUtilitario utilitario = 18;
    DetalhesMotocicleta motocicleta = 19;
  }
}

// MENSAGENS DE REQUISIÇÃO PARA VEÍCULOS

message RequisicaoObterVeiculoPorId {
  int32 id_veiculo = 1;
}

message RequisicaoListarVeiculos {
  // Poderíamos adicionar paginação ou filtros aqui futuramente
}

message RespostaListaVeiculos {
  repeated Veiculo veiculos = 1;
}

// ESTRUTURAS DE RESERVAS

message RequisicaoSimularReserva {
  int32 veiculo_id = 1;
  string data_retirada = 2; // Formato ISO 8601 (ex: "2026-06-10T14:00:00")
  string data_devolucao = 3;
  bool seguro_pessoal = 4;
  bool seguro_terceiros = 5;
}

message RespostaSimularReserva {
  int32 quantidade_diarias = 1;
  float valor_diarias = 2;
  float valor_seguros = 3;
  float valor_total_estimado = 4;
}

message RequisicaoCriarReserva {
  int32 veiculo_id = 1;
  string data_retirada = 2;
  string data_devolucao = 3;
  bool seguro_pessoal = 4;
  bool seguro_terceiros = 5;
  int32 motorista_id = 6; // Opcional no Python, no gRPC se vier 0 ignoramos
  int32 cliente_id = 7;   // Quem está fazendo a reserva
}

message Reserva {
  int32 id_reserva = 1;
  string data_criacao = 2;
  float valor_diaria_no_momento = 3;
  float valor_total_estimado = 4;
  StatusReserva status = 5;
  
  // Relações
  int32 cliente_id = 6;
  int32 motorista_id = 7;
  Veiculo veiculo = 8;
}

// SERVIÇOS gRPC 

service ServicoGestaoVeiculos {
  rpc ObterVeiculo(RequisicaoObterVeiculoPorId) returns (Veiculo);
  rpc ListarVeiculos(RequisicaoListarVeiculos) returns (RespostaListaVeiculos);
  // (Omiti os métodos de Criar/Atualizar para não deixar o arquivo gigante, 
  // mas podemos adicionar depois se o Gateway for suportar operações de Admin)
}

service ServicoGestaoReservas {
  rpc SimularReserva(RequisicaoSimularReserva) returns (RespostaSimularReserva);
  rpc CriarReserva(RequisicaoCriarReserva) returns (Reserva);
}